<!-- Brainstorm Board — Excalidraw + AI whiteboard panel (v2.1 plugin) -->
<!-- Runs inside an iframe (srcdoc). Communicates with host via postMessage. -->
<!-- Requires internet for Excalidraw CDN. Falls back to textarea if blocked. -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  /* ── CSS 变量回退值 (iframe 内无法继承宿主 :root) ── */
  /* Fallback values — host injects actual theme via postMessage */
  :root {
    --bg-side: #161619;
    --bg-elev: #242429;
    --bg-input: #2a2a31;
    --border: #34343c;
    --text: #e7e7ec;
    --text-dim: #9a9aa4;
    --text-faint: #6c6c76;
    --accent: #8b5cf6;
    --accent-dim: #6d28d9;
    --danger: #e05050;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    height: 100vh; overflow: hidden;
    background: var(--bg-side);
    font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    color: var(--text);
  }

  /* ── 布局骨架 / Layout skeleton ── */
  #bs-root {
    display: flex; flex-direction: column; height: 100vh; width: 100%;
    position: relative; overflow: hidden;
  }

  /* ── 顶部工具栏 / Top toolbar ── */
  #bs-toolbar {
    display: flex; align-items: center; gap: 6px;
    padding: 8px 14px; flex-shrink: 0;
    background: var(--bg-elev);
    border-bottom: 1px solid var(--border);
    z-index: 20;
  }
  #bs-toolbar .bs-title {
    font-size: 13px; font-weight: 600; letter-spacing: .02em;
    color: var(--text); margin-right: auto;
    display: flex; align-items: center; gap: 8px;
  }
  #bs-toolbar .bs-title svg {
    width: 16px; height: 16px;
    color: var(--accent); flex-shrink: 0;
  }

  /* ── 按钮 / Buttons ── */
  .bs-btn {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 5px 12px; border-radius: 7px;
    border: 1px solid var(--border);
    background: var(--bg-input);
    color: var(--text);
    font-size: 12px; font-weight: 500; white-space: nowrap;
    cursor: pointer; transition: background .15s, border-color .15s, opacity .15s;
  }
  .bs-btn:hover {
    background: var(--accent-dim);
    border-color: var(--accent);
  }
  .bs-btn:active { transform: scale(.97); }
  .bs-btn:disabled { opacity: .35; cursor: default; transform: none; }
  .bs-btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  .bs-btn svg { width: 13px; height: 13px; flex-shrink: 0; }

  /* ── 画布区 / Canvas area ── */
  #bs-canvas-wrap { flex: 1; min-height: 0; position: relative; }
  #bs-excalidraw { width: 100%; height: 100%; }

  /* ── 空状态 / Empty state ── */
  #bs-empty {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 12px;
    pointer-events: none; z-index: 5;
    color: var(--text-faint); font-size: 13px;
    transition: opacity .3s;
  }
  #bs-empty.hidden { opacity: 0; }
  #bs-empty svg {
    width: 48px; height: 48px; opacity: .3;
    color: var(--accent);
  }

  /* ── 加载指示 / Loading indicator ── */
  #bs-loading {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    display: flex; flex-direction: column; align-items: center; gap: 14px;
    z-index: 15; color: var(--text-dim); font-size: 13px;
  }
  #bs-loading.hidden { display: none; }
  .bs-spinner {
    width: 32px; height: 32px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: bs-spin .8s linear infinite;
  }
  @keyframes bs-spin { to { transform: rotate(360deg); } }

  /* ── Fallback 文本模式 / Fallback text mode ── */
  #bs-fallback {
    position: absolute; inset: 0; z-index: 10;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 10px; padding: 24px;
    background: var(--bg-side);
    opacity: 0; pointer-events: none; transition: opacity .3s;
  }
  #bs-fallback.show { opacity: 1; pointer-events: auto; }
  #bs-fallback textarea {
    width: 100%; max-width: 500px; height: 200px;
    background: var(--bg-input); border: 1px solid var(--border);
    border-radius: 8px; padding: 12px;
    color: var(--text); font-size: 13px; resize: vertical;
  }
  #bs-fallback textarea:focus { outline: none; border-color: var(--accent); }

  /* ── AI 结果面板 / AI result panel ── */
  #bs-result {
    position: absolute; top: 0; right: 0; bottom: 0;
    width: 380px; max-width: 90vw;
    background: var(--bg-elev);
    border-left: 1px solid var(--border);
    display: flex; flex-direction: column;
    transform: translateX(100%);
    transition: transform .3s cubic-bezier(.4, 0, .2, 1);
    z-index: 30;
  }
  #bs-result.show { transform: translateX(0); }
  #bs-result-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .bs-result-title {
    display: flex; align-items: center; gap: 8px;
    font-size: 13px; font-weight: 600; color: var(--text);
  }
  .bs-result-title svg { width: 14px; height: 14px; color: var(--accent); }
  #bs-result-close {
    background: none; border: none; cursor: pointer;
    color: var(--text-dim); padding: 4px; border-radius: 4px;
    display: flex; align-items: center;
  }
  #bs-result-close:hover { color: var(--text); background: var(--bg-input); }
  #bs-result-close svg { width: 16px; height: 16px; }
  #bs-result-body {
    flex: 1; overflow-y: auto; padding: 16px;
    font-size: 13px; line-height: 1.6; color: var(--text);
  }
  #bs-result-body pre {
    background: var(--bg-input); border-radius: 6px; padding: 12px;
    font-size: 11px; overflow-x: auto; margin: 8px 0;
  }
  #bs-result-body code { font-family: 'SF Mono', Menlo, Consolas, monospace; }
  #bs-result-actions {
    padding: 12px 16px; border-top: 1px solid var(--border);
    flex-shrink: 0;
  }
  #bs-result-actions.show { display: block; }
  #bs-result-actions:not(.show) { display: none; }
  #bs-add-btn {
    width: 100%; display: flex; align-items: center; justify-content: center; gap: 6px;
    padding: 8px 16px; border-radius: 7px;
    border: 1px solid var(--accent);
    background: var(--accent-dim);
    color: #fff; font-size: 12px; font-weight: 600;
    cursor: pointer; transition: opacity .15s;
  }
  #bs-add-btn:hover { opacity: .85; }
  #bs-add-btn svg { width: 14px; height: 14px; }

  /* ── 底部 AI 操作栏 / Bottom AI action bar ── */
  #bs-ai-bar {
    display: flex; align-items: center; gap: 6px;
    padding: 8px 14px; flex-shrink: 0;
    background: var(--bg-elev);
    border-top: 1px solid var(--border);
    z-index: 20;
  }
  .bs-ai-label {
    font-size: 10px; font-weight: 700; letter-spacing: .08em;
    text-transform: uppercase;
    color: var(--accent); margin-right: 4px;
  }
  .bs-ai-btn {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 6px 14px; border-radius: 7px;
    border: 1px solid var(--border);
    background: var(--bg-input);
    color: var(--text);
    font-size: 12px; font-weight: 500; white-space: nowrap;
    cursor: pointer; transition: all .15s;
  }
  .bs-ai-btn:hover:not(:disabled) {
    background: var(--accent-dim);
    border-color: var(--accent);
  }
  .bs-ai-btn:active:not(:disabled) { transform: scale(.97); }
  .bs-ai-btn:disabled { opacity: .3; cursor: default; }
  .bs-ai-btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  .bs-ai-btn svg { width: 13px; height: 13px; }
  #bs-status {
    margin-left: auto; font-size: 11px;
    color: var(--text-faint);
  }

  /* ── Toast / Toast notification ── */
  #bs-toast {
    position: absolute; bottom: 60px; left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--bg-elev);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 18px; border-radius: 8px;
    font-size: 12px; font-weight: 500;
    opacity: 0; pointer-events: none;
    transition: all .3s cubic-bezier(.4, 0, .2, 1);
    z-index: 100;
    box-shadow: 0 4px 16px rgba(0, 0, 0, 0.4);
  }
  #bs-toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* ── 可访问性 / Accessibility ── */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      transition-duration: 0.01ms !important;
    }
  }
</style>
</head>
<body>
<div id="bs-root">
  <!-- 顶部工具栏 / Toolbar -->
  <div id="bs-toolbar">
    <span class="bs-title">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="5" r="2"/><circle cx="5" cy="19" r="2"/><circle cx="19" cy="19" r="2"/><path d="M12 7v4M12 11l-6.5 6M12 11l6.5 6"/></svg>
      Brainstorm Board
    </span>
    <button class="bs-btn" id="bs-btn-clear" title="Clear canvas">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>
      Clear
    </button>
    <button class="bs-btn" id="bs-btn-export" title="Export as PNG">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>
      Export
    </button>
  </div>

  <!-- 加载状态 / Loading state -->
  <div id="bs-loading">
    <div class="bs-spinner"></div>
    <span>Loading canvas…</span>
  </div>

  <!-- 空状态 / Empty state -->
  <div id="bs-empty">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18h6M10 22h4"/><path d="M12 2a7 7 0 0 0-4 12.7c.6.5 1 1.3 1 2.1V18h6v-1.2c0-.8.4-1.6 1-2.1A7 7 0 0 0 12 2z"/></svg>
    <span>Start drawing, then let AI expand your ideas</span>
  </div>

  <!-- Excalidraw 容器 / Excalidraw container -->
  <div id="bs-canvas-wrap">
    <div id="bs-excalidraw"></div>
  </div>

  <!-- Fallback 文本模式 / Fallback text mode -->
  <div id="bs-fallback">
    <div>Excalidraw unavailable — text mode active. Type your ideas below.</div>
    <textarea id="bs-fallback-text" placeholder="Write your ideas here, one per line…"></textarea>
  </div>

  <!-- AI 结果面板 / AI result panel -->
  <div id="bs-result">
    <div id="bs-result-header">
      <span class="bs-result-title">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L4.5 12.5a1 1 0 00.8 1.5H10l-1 8 8.5-10.5a1 1 0 00-.8-1.5H12z"/></svg>
        <span id="bs-result-mode">AI Insight</span>
      </span>
      <button id="bs-result-close" title="Close">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div id="bs-result-body"></div>
    <div id="bs-result-actions">
      <button id="bs-add-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Add to Canvas
      </button>
    </div>
  </div>

  <!-- 底部 AI 操作栏 / Bottom AI action bar -->
  <div id="bs-ai-bar">
    <span class="bs-ai-label">AI</span>
    <button class="bs-ai-btn" data-mode="expand" disabled title="Generate new related ideas">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="M7 14l4-4 4 4 6-6"/></svg>
      Expand
    </button>
    <button class="bs-ai-btn" data-mode="organize" disabled title="Structure into categories">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      Organize
    </button>
    <button class="bs-ai-btn" data-mode="challenge" disabled title="Find gaps and blind spots">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></svg>
      Challenge
    </button>
    <button class="bs-ai-btn" data-mode="synthesize" disabled title="Find themes and synthesize">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="5" r="2"/><circle cx="5" cy="19" r="2"/><circle cx="19" cy="19" r="2"/><path d="M12 7v4M12 11l-6.5 6M12 11l6.5 6"/></svg>
      Synthesize
    </button>
    <span id="bs-status">Loading…</span>
  </div>

  <!-- Toast / Toast notification -->
  <div id="bs-toast"></div>
</div>

<script>
(function() {
  'use strict';

  // ═══════════════════════════════════════════════════════════════
  //  宿主通信层 — postMessage bridge to parent window (iframe context)
  //  Host (app.ts) listens for these and calls real KinetAPI
  // ═══════════════════════════════════════════════════════════════

  // 请求 ID 计数器 / Request ID counter
  var reqId = 0;
  // 待处理请求回调 / Pending request callbacks
  var pending = {};

  // 发送请求到宿主, 返回 Promise / Send request to host, returns Promise
  function hostCall(method, args) {
    var id = ++reqId;
    return new Promise(function(resolve, reject) {
      // 30 秒超时, 防止永久 pending / 30s timeout to avoid hanging
      var timer = setTimeout(function() {
        if (pending[id]) {
          delete pending[id];
          reject('hostCall timeout: ' + method);
        }
      }, 30000);
      pending[id] = {
        resolve: function(v) { clearTimeout(timer); resolve(v); },
        reject: function(e) { clearTimeout(timer); reject(e); }
      };
      window.parent.postMessage({
        source: 'brainstorm',
        id: id,
        method: method,
        args: args || []
      }, '*');
    });
  }

  // 监听宿主响应 / Listen for host responses
  window.addEventListener('message', function(ev) {
    var data = ev.data;
    if (!data || data.target !== 'brainstorm') return;

    // 响应类型 / Response to a request
    if (data.id && pending[data.id]) {
      if (data.error) {
        pending[data.id].reject(data.error);
      } else {
        pending[data.id].resolve(data.result);
      }
      delete pending[data.id];
      return;
    }

    // 宿主主动推送 (如主题变更) / Host push (e.g. theme change)
    if (data.type === 'theme') {
      applyTheme(data.cssVars || {});
    }
  });

  // 应用宿主主题变量 / Apply host theme CSS variables
  function applyTheme(vars) {
    var root = document.documentElement;
    for (var key in vars) {
      root.style.setProperty(key, vars[key]);
    }
  }

  // 请求宿主发送当前主题 / Request current theme from host
  // (host sends CSS var values via postMessage)
  hostCall('getTheme', []).then(function(vars) {
    if (vars) applyTheme(vars);
  }).catch(function() {});

  // ═══════════════════════════════════════════════════════════════
  //  状态 / State
  // ═══════════════════════════════════════════════════════════════

  var excaliReady = false;
  var excaliAPI = null;
  var cachedEls = [];  // onChange 缓存 / Cached from onChange
  var lastAIResponse = '';
  var lastAIMode = '';
  var isLoading = false;

  // DOM 引用 / DOM refs
  var elRoot       = document.getElementById('bs-root');
  var elLoading    = document.getElementById('bs-loading');
  var elEmpty      = document.getElementById('bs-empty');
  var elFallback   = document.getElementById('bs-fallback');
  var elResult     = document.getElementById('bs-result');
  var elResultBody = document.getElementById('bs-result-body');
  var elResultMode = document.getElementById('bs-result-mode');
  var elResultAct  = document.getElementById('bs-result-actions');
  var elStatus     = document.getElementById('bs-status');
  var elToast      = document.getElementById('bs-toast');
  var aiButtons    = document.querySelectorAll('.bs-ai-btn');

  var MODE_LABELS = {
    expand:     'Expand Ideas',
    organize:   'Organize & Structure',
    challenge:  'Challenge & Gaps',
    synthesize: 'Synthesize Themes'
  };

  // ═══════════════════════════════════════════════════════════════
  //  Toast / Toast notification
  // ═══════════════════════════════════════════════════════════════

  var toastTimer = null;
  function toast(msg) {
    elToast.textContent = msg;
    elToast.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function() { elToast.classList.remove('show'); }, 2200);
  }

  // ═══════════════════════════════════════════════════════════════
  //  Excalidraw 加载 / Load Excalidraw
  // ═══════════════════════════════════════════════════════════════

  function initExcalidraw() {
    elLoading.classList.remove('hidden');
    elEmpty.classList.add('hidden');

    // React 18 → ReactDOM → Excalidraw (CDN) / Chain load scripts
    // 注意: 不设 crossOrigin 避免某些环境下 CORS 预检失败
    var reactScript = document.createElement('script');
    reactScript.src = 'https://unpkg.com/react@18.3.1/umd/react.production.min.js';
    reactScript.onload = function() {
      var reactDomScript = document.createElement('script');
      reactDomScript.src = 'https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js';
      reactDomScript.onload = function() {
        var excaliScript = document.createElement('script');
        excaliScript.src = 'https://unpkg.com/@excalidraw/excalidraw@0.17.6/dist/excalidraw.production.min.js';
        excaliScript.onload = function() {
          // 给 UMD bundle 一点时间初始化全局变量 / Let UMD init globals
          setTimeout(mountExcalidraw, 50);
        };
        excaliScript.onerror = function() {
          console.error('[brainstorm] Excalidraw script failed to load');
          activateFallback();
        };
        document.head.appendChild(excaliScript);
      };
      reactDomScript.onerror = function() {
        console.error('[brainstorm] ReactDOM script failed to load');
        activateFallback();
      };
      document.head.appendChild(reactDomScript);
    };
    reactScript.onerror = function() {
      console.error('[brainstorm] React script failed to load');
      activateFallback();
    };
    document.head.appendChild(reactScript);
  }

  function mountExcalidraw() {
    try {
      var ExcalidrawLib = window.ExcalidrawLib;
      if (!ExcalidrawLib || !ExcalidrawLib.Excalidraw) {
        console.error('[brainstorm] ExcalidrawLib not found on window');
        activateFallback();
        return;
      }
      var excaliRoot = document.getElementById('bs-excalidraw');

      // React 18 createRoot — 挂载 Excalidraw 组件 / Mount Excalidraw
      var apiRef = { current: null };
      var root = ReactDOM.createRoot(excaliRoot);
      root.render(
        React.createElement(ExcalidrawLib.Excalidraw, {
          excalidrawAPI: function(api) { apiRef.current = api; },
          onChange: function(els) {
            cachedEls = els || [];
            updateEmptyState(els && els.length ? els : []);
            updateAIButtons(els && els.length ? els.length > 0 : false);
          }
        })
      );

      // 等待 ref API 就绪 (React 异步渲染) / Wait for ref API
      var apiCheckCount = 0;
      var apiCheckTimer = setInterval(function() {
        apiCheckCount++;
        if (apiRef.current) {
          clearInterval(apiCheckTimer);
          excaliAPI = apiRef.current;
          onReady();
        } else if (apiCheckCount > 30) {
          // 3 秒超时 / 3s timeout
          clearInterval(apiCheckTimer);
          onReady();
        }
      }, 100);

      function onReady() {
        excaliReady = true;
        elLoading.classList.add('hidden');
        elEmpty.classList.remove('hidden');
        elStatus.textContent = 'Ready';
        syncExcalidrawTheme();
        toast('Canvas ready');
      }
    } catch (e) {
      console.error('[brainstorm] mount failed:', e);
      activateFallback();
    }
  }

  function syncExcalidrawTheme() {
    if (!excaliAPI) return;
    // 检测暗色/亮色 / Detect dark/light from CSS var
    var isDark = true;
    var bg = getComputedStyle(document.documentElement).getPropertyValue('--bg-side').trim();
    if (bg && bg.startsWith('#')) {
      var hex = bg.replace('#', '');
      if (hex.length === 6) {
        var r = parseInt(hex.substr(0, 2), 16);
        var g = parseInt(hex.substr(2, 2), 16);
        var b = parseInt(hex.substr(4, 2), 16);
        isDark = (r + g + b) / 3 < 128;
      }
    }
    try {
      excaliAPI.updateScene({ appState: { theme: isDark ? 'dark' : 'light' } });
    } catch (e) { /* non-fatal */ }
  }

  function activateFallback() {
    elLoading.classList.add('hidden');
    elEmpty.classList.add('hidden');
    elFallback.classList.add('show');
    elStatus.textContent = 'Text mode (offline)';
    aiButtons.forEach(function(btn) { btn.disabled = false; });
  }

  function updateEmptyState(els) {
    var hasReal = els.some(function(e) { return !e.isDeleted; });
    elEmpty.classList.toggle('hidden', hasReal);
  }

  function updateAIButtons(hasContent) {
    if (isLoading) return;
    aiButtons.forEach(function(btn) { btn.disabled = !hasContent; });
  }

  // ═══════════════════════════════════════════════════════════════
  //  画布数据 / Canvas data operations
  // ═══════════════════════════════════════════════════════════════

  function getCanvasData() {
    var els = [];
    if (excaliReady) {
      if (excaliAPI) {
        try { els = excaliAPI.getSceneElements(); } catch (e) { els = cachedEls; }
      } else {
        els = cachedEls;
      }
      return els.filter(function(e) { return !e.isDeleted; }).map(function(e) {
        var item = { type: e.type, x: Math.round(e.x), y: Math.round(e.y), width: Math.round(e.width), height: Math.round(e.height) };
        if (e.text) item.text = e.text;
        return item;
      });
    } else {
      // Fallback: 解析文本 / Parse textarea
      var text = (document.getElementById('bs-fallback-text') || {}).value || '';
      return text.split('\n').filter(function(l) { return l.trim(); }).map(function(l, i) {
        return { type: 'text', text: l.trim(), x: 100, y: 80 + i * 60, width: 200, height: 40 };
      });
    }
  }

  // ═══════════════════════════════════════════════════════════════
  //  AI 操作 / AI action
  // ═══════════════════════════════════════════════════════════════

  function runAI(mode) {
    if (isLoading) return;

    // 通过 postMessage 获取会话 ID / Get conv ID via postMessage
    hostCall('getActiveConvId', []).then(function(convId) {
      if (!convId) {
        toast('Select a conversation first');
        return;
      }

      var data = getCanvasData();
      if (!data.length) {
        toast('Draw something first');
        return;
      }

      isLoading = true;
      lastAIMode = mode;
      elStatus.textContent = 'AI thinking…';
      aiButtons.forEach(function(btn) { btn.disabled = true; });

      var prompts = {
        expand: 'Expand on these ideas. Generate 4-6 new related ideas that build upon what is on the canvas. Consider adjacent topics, creative extensions, and unexpected connections.',
        organize: 'Analyze the elements on this canvas and organize them into logical categories or clusters. Identify the natural groupings and suggest a clearer structure.',
        challenge: 'Play devil\'s advocate. Identify gaps, contradictions, assumptions, and blind spots in the ideas on this canvas. Be constructive but thorough.',
        synthesize: 'Synthesize the key themes from this canvas. What patterns emerge? What is the core narrative? Suggest a unified framework that connects everything.'
      };

      var prompt = '## Canvas Elements\n\n```json\n' + JSON.stringify(data, null, 2) + '\n```\n\n## Task\n\n' + prompts[mode] + '\n\n' +
        '## Output Format\n\n' +
        '1. Write 2-3 sentences of analysis.\n' +
        '2. Then provide your suggestions as a JSON code block (for "Add to Canvas"):\n' +
        '```json\n[{"type": "text", "text": "Suggestion text", "x": 100, "y": 200, "width": 200, "height": 60}]\n```\n' +
        'Position new elements away from existing ones (offset y by +400 or more).';

      elResultMode.textContent = MODE_LABELS[mode] || 'AI Insight';
      elResultBody.innerHTML = '<div style="display:flex;align-items:center;gap:8px;color:var(--text-faint)"><div class="bs-spinner" style="width:20px;height:20px;border-width:2px"></div> Waiting for AI response…</div>';
      elResultAct.classList.remove('show');
      elResult.classList.add('show');

      // 发送到对话 / Send to conversation via postMessage
      hostCall('send', [convId, prompt]).then(function() {
        waitForResponse(convId);
      }).catch(function(err) {
        finishLoading();
        elResultBody.innerHTML = '<span style="color:var(--danger)">Failed to send: ' + escapeHtml(String(err)) + '</span>';
      });
    }).catch(function() {
      toast('Cannot connect to host');
    });
  }

  // ── 轮询 AI 响应 / Poll conversation for AI reply ──
  function waitForResponse(convId) {
    var attempts = 0;
    var maxAttempts = 120; // 2 分钟超时 / 2 min timeout
    var initialTurnCount = 0;

    hostCall('getConversations', []).then(function(convs) {
      var conv = findConv(convs, convId);
      initialTurnCount = conv ? turnCount(conv) : 0;
      poll();
    }).catch(function() { poll(); });

    function poll() {
      attempts++;
      if (attempts > maxAttempts) {
        finishLoading();
        elResultBody.innerHTML = '<span style="color:var(--text-faint)">Response timed out. Check the conversation for results.</span>';
        return;
      }

      hostCall('getConversations', []).then(function(convs) {
        var conv = findConv(convs, convId);
        if (!conv) { setTimeout(poll, 1500); return; }

        var turns = conv.turns || [];
        if (turns.length > initialTurnCount) {
          var latest = turns[turns.length - 1];
          if (latest && latest.status === 'done') {
            finishLoading();
            displayAIResult(latest);
            return;
          }
          if (latest && latest.text) {
            elResultBody.innerHTML = '<div style="opacity:.6">' + formatMarkdown(latest.text) + '</div>';
          }
          setTimeout(poll, 1500);
        } else {
          setTimeout(poll, 1500);
        }
      }).catch(function() { setTimeout(poll, 1500); });
    }
  }

  function findConv(convs, id) {
    return convs.find(function(c) { return c.id === id; });
  }
  function turnCount(conv) {
    return conv.turns ? conv.turns.length : (conv.turnCount || 0);
  }

  function finishLoading() {
    isLoading = false;
    elStatus.textContent = 'Ready';
    var hasContent = getCanvasData().length > 0;
    aiButtons.forEach(function(btn) { btn.disabled = !hasContent; });
  }

  function displayAIResult(turn) {
    lastAIResponse = turn.text || '';
    elResultBody.innerHTML = formatMarkdown(lastAIResponse);
    // 检测是否有 JSON code block (可添加到画布) / Check for JSON code block
    var jsonMatch = lastAIResponse.match(/```json\s*([\s\S]*?)```/);
    if (jsonMatch) {
      try {
        var parsed = JSON.parse(jsonMatch[1]);
        if (Array.isArray(parsed) && parsed.length > 0) {
          elResultAct.classList.add('show');
          return;
        }
      } catch (e) { /* JSON 解析失败, 不显示按钮 */ }
    }
    elResultAct.classList.remove('show');
  }

  // ═══════════════════════════════════════════════════════════════
  //  添加 AI 建议到画布 / Add AI suggestions to canvas
  // ═══════════════════════════════════════════════════════════════

  function addToCanvas() {
    var jsonMatch = lastAIResponse.match(/```json\s*([\s\S]*?)```/);
    if (!jsonMatch) { toast('No elements to add'); return; }

    var newEls;
    try { newEls = JSON.parse(jsonMatch[1]); }
    catch (e) { toast('Invalid JSON'); return; }

    if (!Array.isArray(newEls) || newEls.length === 0) { toast('No elements'); return; }

    if (excaliReady) {
      var api = excaliAPI;
      if (!api) { toast('Canvas API not ready'); return; }
      var existing = api.getSceneElements();

      var nextEls = newEls.map(function(e) {
        return {
          id: crypto.randomUUID(),
          type: e.type || 'text',
          x: e.x || 100,
          y: e.y || 400,
          width: e.width || 200,
          height: e.height || 60,
          angle: 0,
          strokeColor: '#8b5cf6',
          backgroundColor: e.type === 'rectangle' ? 'transparent' : 'transparent',
          fillStyle: 'solid',
          strokeWidth: 1,
          strokeStyle: 'solid',
          roughness: 1,
          opacity: 100,
          groupIds: [],
          frameId: null,
          roundness: null,
          seed: Math.floor(Math.random() * 1000000),
          version: 1,
          versionNonce: Math.floor(Math.random() * 1000000),
          isDeleted: false,
          boundElements: [],
          updated: Date.now(),
          link: null,
          locked: false,
          text: e.text || '',
          fontSize: 16,
          fontFamily: 1,
          textAlign: 'center',
          verticalAlign: 'middle',
          containerId: null,
          originalText: e.text || '',
          lineHeight: 1.25,
          baseline: 18
        };
      });

      api.updateScene({ elements: existing.concat(nextEls) });
      toast('Added ' + newEls.length + ' elements');
    } else {
      // Fallback: 追加到文本框 / Append to textarea
      var ta = document.getElementById('bs-fallback-text');
      newEls.forEach(function(e) {
        ta.value += '\n' + (e.text || JSON.stringify(e));
      });
      toast('Added to text');
    }

    elResult.classList.remove('show');
  }

  // ── 清空画布 / Clear canvas ──
  function clearCanvas() {
    if (excaliReady && excaliAPI) {
      try { excaliAPI.updateScene({ elements: [] }); } catch (e) { /* noop */ }
      elEmpty.classList.remove('hidden');
    } else {
      var ta = document.getElementById('bs-fallback-text');
      if (ta) ta.value = '';
    }
    elResult.classList.remove('show');
    toast('Canvas cleared');
  }

  // ── 导出 PNG / Export PNG ──
  function exportPNG() {
    if (excaliReady && excaliAPI) {
      excaliAPI.exportToBlob({ type: 'image/png', quality: 0.92 }).then(function(blob) {
        var url = URL.createObjectURL(blob);
        var a = document.createElement('a');
        a.href = url;
        a.download = 'brainstorm-' + Date.now() + '.png';
        a.click();
        URL.revokeObjectURL(url);
        toast('Exported');
      }).catch(function() { toast('Export failed'); });
    } else {
      toast('Canvas not available');
    }
  }

  // ═══════════════════════════════════════════════════════════════
  //  Markdown 渲染 (简易) / Simple Markdown renderer
  // ═══════════════════════════════════════════════════════════════

  function formatMarkdown(text) {
    var html = escapeHtml(text);
    // code blocks
    html = html.replace(/```(\w*)\n?([\s\S]*?)```/g, function(_, lang, code) {
      return '<pre><code>' + code.trim() + '</code></pre>';
    });
    // inline code
    html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
    // bold
    html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
    // headings
    html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
    html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
    html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');
    // line breaks
    html = html.replace(/\n/g, '<br>');
    return html;
  }

  function escapeHtml(text) {
    var div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
  }

  // ═══════════════════════════════════════════════════════════════
  //  事件绑定 / Bind events
  // ═══════════════════════════════════════════════════════════════

  aiButtons.forEach(function(btn) {
    btn.addEventListener('click', function() {
      var mode = btn.getAttribute('data-mode');
      runAI(mode);
    });
  });

  document.getElementById('bs-btn-clear').addEventListener('click', clearCanvas);
  document.getElementById('bs-btn-export').addEventListener('click', exportPNG);
  document.getElementById('bs-add-btn').addEventListener('click', addToCanvas);
  document.getElementById('bs-result-close').addEventListener('click', function() {
    elResult.classList.remove('show');
  });

  // ── 初始化 / Initialize ──
  initExcalidraw();
})();
</script>
</body>
</html>
